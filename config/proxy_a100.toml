# Noor Proxy — A100 80GB config
# Full architecture validation: MoE, SMEBU, sandwich norm, parallel dense+MoE
# Bigger batch + context than RTX 3060 — A100 has 80GB VRAM.

[model]
name = "noor-proxy"
d_model = 768
n_layers = 16
n_heads = 12
n_kv_heads = 4
head_dim = 64
vocab_size = 64000
context_length = 2048
precision = "f32"

[moe]
enabled = true
n_experts = 8
n_active_experts = 2
has_shared_expert = true
expert_ffn_dim = 384
dense_ffn_dim = 1024

[attention]
sliding_window = 512
global_every_n = 6

[norm]
sandwich = true
eps = 1e-6

[residual]
use_attnres = false
attnres_blocks = 4

[ple]
enabled = false
ple_dim = 64

[rope]
theta = 10000.0
prope_theta = 1000000.0
prope_fraction = 0.25

[training]
lr_max = 3e-4
lr_min = 3e-5
warmup_steps = 500
total_steps = 10000
batch_size_tokens = 16384   # 8 seqs × 2048 — A100 has headroom
micro_batch_tokens = 4096
grad_clip = 1.0
checkpoint_every_steps = 1000
log_every_steps = 10

[optimizer]
type = "muon"
beta = 0.9
qk_clip_tau = 100.0

[smebu]
kappa = 5.0
beta = 0.9
lambda = 0.01
