# Noor Proxy Tiny — smallest possible model for validation
# Runs fast on CPU. Validates the full training pipeline.

[model]
name = "noor-proxy-tiny"
d_model = 64
n_layers = 4
n_heads = 4
n_kv_heads = 2
head_dim = 16
vocab_size = 64000
context_length = 64
precision = "f32"

[moe]
enabled = true
n_experts = 4
n_active_experts = 2
has_shared_expert = true
expert_ffn_dim = 32
dense_ffn_dim = 64

[attention]
sliding_window = 32
global_every_n = 4

[norm]
sandwich = true
eps = 1e-6

[residual]
use_attnres = false
attnres_blocks = 0

[ple]
enabled = false
ple_dim = 0

[rope]
theta = 10000.0
prope_theta = 1000000.0
prope_fraction = 0.25

[training]
lr_max = 1e-3
lr_min = 1e-4
warmup_steps = 10
total_steps = 100
batch_size_tokens = 128
micro_batch_tokens = 64
grad_clip = 1.0
checkpoint_every_steps = 50
log_every_steps = 5

[optimizer]
type = "muon"
beta = 0.9
qk_clip_tau = 100.0

[smebu]
kappa = 5.0
beta = 0.9
lambda = 0.01
